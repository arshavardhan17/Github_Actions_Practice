name: Deployment Workflow

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./02 Starting Project

      - name: Run Tests
        run: npm test
        working-directory: ./02 Starting Project
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: ./02 Starting Project
      - name: Build Project
        run: npm run build
        working-directory: ./02 Starting Project
      - name: Deploy
        run: echo "Deployed the app"
        working-directory: ./02 Starting Project
